name: OceanCare CI

on:
  push:
    branches:
      - main
    paths:
      - "src/api/OceanCare.Api/**"
      - "src/web/oceancare-web/**"
      - "tests/OceanCare.Api.Tests/**"
      - "docs/**"
      - "docker-compose.yml"
      - "OceanCare.slnx"
      - ".github/workflows/oceancare-ci.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "src/api/OceanCare.Api/**"
      - "src/web/oceancare-web/**"
      - "tests/OceanCare.Api.Tests/**"
      - "docs/**"
      - "docker-compose.yml"
      - "OceanCare.slnx"
      - ".github/workflows/oceancare-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore backend projects
        run: |
          dotnet restore src/api/OceanCare.Api/OceanCare.Api.csproj
          dotnet restore tests/OceanCare.Api.Tests/OceanCare.Api.Tests.csproj

      - name: Build solution
        run: dotnet build OceanCare.slnx --no-restore

      - name: Run backend tests
        run: dotnet test tests/OceanCare.Api.Tests/OceanCare.Api.Tests.csproj --no-build --verbosity normal

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: src/web/oceancare-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/web/oceancare-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-smoke:
    name: Docker compose smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for API
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:5000/api/species >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "API did not become ready in time." >&2
          exit 1

      - name: Verify frontend is reachable
        run: curl --fail --silent http://localhost:3000 >/dev/null

      - name: Stop stack
        if: always()
        run: docker compose down -v
