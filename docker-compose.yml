services:
  api:
    build:
      context: ./src/api/OceanCare.Api
      dockerfile: Dockerfile
    container_name: oceancare-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__Default=Data Source=/data/oceancare.db
      - Jwt__Key=OceanCare-Super-Secret-JWT-Key-2024-Change-In-Production!
      - Jwt__Issuer=OceanCare
      - Jwt__Audience=OceanCareClient
    volumes:
      - api-data:/data
    ports:
      - "5000:8080"
    networks:
      - oceancare-net

  frontend:
    build:
      context: ./src/web/oceancare-web
      dockerfile: Dockerfile
    container_name: oceancare-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - oceancare-net

volumes:
  api-data:

networks:
  oceancare-net:
    driver: bridge
